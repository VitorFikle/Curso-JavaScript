<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios avulsos</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #textoAviso {
            color: red;
        }

        input {
            width: 300px;
            height: 30px;
            font-size: 20px;
        }

        button {
            width: 200px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <input type="text" id="textoAviso" placegolder="Digite aqui o que você quiser!">
    <button id="alerta">ALERTA TA PEGANDO FOGO</button>


    <script>
        let textoAviso = document.getElementById("textoAviso") // seleciona o elemento input pelo id e armazena na variável textoAviso
        let alerta = document.getElementById("alerta") // seleciona o elemento pelo id e armazena na variável alerta
        alerta.addEventListener("click", function () { // função que é executado quando clicar o botão
            alert(textoAviso.value) // exibe o valor do input em um alerta
        })
    </script>

</body>

</html>
